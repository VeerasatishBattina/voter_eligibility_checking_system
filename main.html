<html>
<head>
    <title>VOTER ELIGIBILITY SYSTEM</title>
</head> 
<body style="text-align: center; background-color:rgb(28, 241, 241);">
    <h2>VOTER ELIGIBILITY CHECKING SYSTEM</h2>
    <label>Name:</label>
    <input type="text" id="name"><br><br>
    <label>Age:</label>
    <input type="number" id="age"><br><br>
    <button onclick="addUser()">CHECK</button>
    <h3>VOTERS DATA</h3>
    <table border="3" , style="border-collapse: collapse; text-align: center; margin: 20px auto; font-size: 18px; width: 70%;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
    <script>
        let users = JSON.parse(localStorage.getItem("users")) || [];
        function addUser() {
            let name = document.getElementById("name").value;
            let age = Number(document.getElementById("age").value);
            let user = {
                name: name,
                age: age,
                eligible: age >= 18 ? "Eligible" : "Not Eligible"
            };
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
            print();
        }
        function print() {
            let tableBody = document.getElementById("table");
            tableBody.innerHTML = "";
            users.forEach(function(user) {
                tableBody.innerHTML +=
                    "<tr>" +
                    "<td>" + user.name + "</td>" +
                    "<td>" + user.age + "</td>" +
                    "<td>" + user.eligible + "</td>" +
                    "</tr>";
            });
        }
        print();
    </script>
</body>
</html>
